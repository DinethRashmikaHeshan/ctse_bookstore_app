openapi: 3.0.0
info:
  title: Book Service API
  description: Book catalog and stock management
  version: 1.0.0
servers:
  - url: http://localhost:3002
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    Book:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        author: { type: string }
        isbn: { type: string }
        price: { type: number }
        stock: { type: integer }
        category: { type: string }
        description: { type: string }
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: Healthy }
  /api/books:
    get:
      summary: List all books
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of books
    post:
      summary: Create a book (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, author, price, stock]
              properties:
                title: { type: string }
                author: { type: string }
                price: { type: number }
                stock: { type: integer }
                category: { type: string }
                description: { type: string }
      responses:
        '201': { description: Book created }
  /api/books/{id}:
    get:
      summary: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Book found }
        '404': { description: Not found }
  /api/books/{id}/with-seller:
    get:
      summary: Get book with seller info (calls User Service)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Book with seller }
  /api/books/{id}/reduce-stock:
    post:
      summary: Reduce stock (internal - called by Order Service)
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity: { type: integer }
      responses:
        '200': { description: Stock updated }
        '400': { description: Insufficient stock }
