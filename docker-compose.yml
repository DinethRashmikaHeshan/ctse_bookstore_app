version: '3.8'

x-shared-env: &shared-env
  JWT_SECRET: bookstore-super-secret-key-change-in-prod
  INTERNAL_API_KEY: internal-service-key-change-in-prod

services:

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      <<: *shared-env
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      BOOK_SERVICE_URL: http://book-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      ALLOWED_ORIGINS: http://localhost:3005
    depends_on:
      - user-service
      - book-service
      - order-service
      - notification-service
    networks:
      - bookstore-net
    restart: unless-stopped

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      <<: *shared-env
      PORT: 3001
      ORDER_SERVICE_URL: http://order-service:3003
      MONGODB_URI: ${MONGODB_URI_USER}
    networks:
      - bookstore-net
    restart: unless-stopped

  book-service:
    build: ./book-service
    ports:
      - "3002:3002"
    environment:
      <<: *shared-env
      PORT: 3002
      USER_SERVICE_URL: http://user-service:3001
      MONGODB_URI: ${MONGODB_URI_BOOK}
    networks:
      - bookstore-net
    restart: unless-stopped

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    environment:
      <<: *shared-env
      PORT: 3003
      BOOK_SERVICE_URL: http://book-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      MONGODB_URI: ${MONGODB_URI_ORDER}
    networks:
      - bookstore-net
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    ports:
      - "3004:3004"
    environment:
      <<: *shared-env
      PORT: 3004
      USER_SERVICE_URL: http://user-service:3001
      MONGODB_URI: ${MONGODB_URI_NOTIF}
    networks:
      - bookstore-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3005:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - bookstore-net
    restart: unless-stopped

networks:
  bookstore-net:
    driver: bridge
